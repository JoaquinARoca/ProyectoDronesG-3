<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Dron</title>

    <!-- MQTT -->
    <script src="https://cdn.jsdelivr.net/npm/mqtt/dist/mqtt.min.js"></script>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Leaflet (mapa) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="/static/indexMQTT.css"/>
    <script src="/static/indexMQTT.js" defer></script>
</head>

<body>
<div class="container mt-3" style="max-width: 600px;">

    <!-- Barra de estado global -->
    <div id="telemetriaDiv" class="p-2 mb-3 bg-dark text-white rounded text-center">
        <span>Altitud: <strong id="altitudValor" class="text-warning">0.00</strong> m</span>
        &nbsp;|&nbsp;
        <small id="estadoDron">Estado: Desconectado</small>
    </div>

    <!-- Pestañas -->
    <ul class="nav nav-tabs" id="pestanas" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="tab-control-btn" data-bs-toggle="tab"
                    data-bs-target="#tab-control" type="button" role="tab">
                Control
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="tab-mapa-btn" data-bs-toggle="tab"
                    data-bs-target="#tab-mapa" type="button" role="tab"
                    onclick="iniciarMapa()">
                Mapa
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="tab-video-btn" data-bs-toggle="tab"
                    data-bs-target="#tab-video" type="button" role="tab">
                Video
            </button>
        </li>
    </ul>

    <div class="tab-content border border-top-0 rounded-bottom p-3">

        <!-- ── TAB 1: CONTROL ── -->
        <div class="tab-pane fade show active" id="tab-control" role="tabpanel">

            <button id="botonConectar" class="boton" onclick="conectarDron()">Conectar con Dron</button>

            <label class="form-label mt-2">Altura de despegue (m):</label>
            <input type="number" id="altura" class="form-control mb-2" placeholder="Ej: 10" value="5">

            <div class="p-2 border rounded bg-light mb-2">
                <label class="form-label">Heading: <span id="headingVal">0</span>°</label>
                <input id="headingRange" type="range" min="0" max="360" value="0" class="form-range"
                       oninput="document.getElementById('headingVal').innerText=this.value;"
                       onchange="cambiarHeading(this.value)">
            </div>

            <button id="botonDespegar" class="boton" onclick="despegarDron()">Despegar</button>
            <button id="botonAterrizar" class="boton" onclick="aterrizarDron()">Aterrizar Dron</button>
            <button id="botonRTL" class="boton" onclick="rtlDron()">RTL (Volver a Casa)</button>

            <div class="direction">
                <div onclick="moverDron('NorthWest')" class="box">NW</div>
                <div onclick="moverDron('North')" class="box">N</div>
                <div onclick="moverDron('NorthEast')" class="box">NE</div>
                <div onclick="moverDron('West')" class="box">W</div>
                <div onclick="moverDron('Stop')" class="box" style="color:red; font-weight:bold;">Stop</div>
                <div onclick="moverDron('East')" class="box">E</div>
                <div onclick="moverDron('SouthWest')" class="box">SW</div>
                <div onclick="moverDron('South')" class="box">S</div>
                <div onclick="moverDron('SouthEast')" class="box">SE</div>
            </div>
        </div>

        <!-- ── TAB 2: MAPA ── -->
        <div class="tab-pane fade" id="tab-mapa" role="tabpanel">
            <div id="map" style="height: 450px; width: 100%; border-radius: 6px;"></div>
            <div class="mt-2 text-muted text-center" style="font-size: 0.85rem;">
                Lat: <span id="mapaLat">—</span> &nbsp; Lon: <span id="mapaLon">—</span>
            </div>
        </div>

        <!-- ── TAB 3: VIDEO ── -->
        <div class="tab-pane fade" id="tab-video" role="tabpanel">
            <div class="mb-2">
                <label class="form-label">Dirección del CameraService (ip:puerto):</label>
                <div class="input-group">
                    <input type="text" id="cameraHost" class="form-control"
                           value="localhost:9999" placeholder="ip:puerto">
                    <button class="btn btn-success" onclick="conectarVideo()">Conectar</button>
                    <button class="btn btn-secondary" onclick="desconectarVideo()">Desconectar</button>
                </div>
            </div>
            <div class="text-center">
                <video id="videoStream" autoplay playsinline muted
                       style="max-width:100%; border-radius:6px; background:#000; min-height:240px;"></video>
                <p id="videoEstado" class="text-muted mt-2" style="font-size:0.85rem;">
                    Desconectado. Asegúrate de que CameraService.py está en marcha y pulsa Conectar.
                </p>
            </div>
        </div>

    </div><!-- /tab-content -->
</div><!-- /container -->
</body>
</html>
